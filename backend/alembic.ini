[alembic]
script_location = alembic
# The new 0006 migration (v1.1) imports
# `from app.schemas.instrument import RESERVED_INSTRUMENT_IDS` at module
# import time (single source of truth). Migration scripts are imported
# by alembic BEFORE env.py adjusts sys.path, so the alembic CLI (`uv run
# alembic ...`) must have the backend root on sys.path before any version
# script is loaded. In-process invocation via app.main:_alembic_upgrade_head
# was unaffected (sys.path already includes `backend/` via the uvicorn entry
# point), but the subprocess test invokes the CLI directly.
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
