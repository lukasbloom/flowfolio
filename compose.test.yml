# Test overlay — hermetic snapshot suite at http://localhost:8091.
#
# Usage:
#   docker compose -f compose.yml -f compose.test.yml up -d
#   cd frontend && npm run test:e2e:snapshots
#
# This overlay now re-points onto the SINGLE image (compose.yml's one
# `flowfolio` service), so the snapshot/e2e suite exercises the SHIPPED artifact
# (real boot order + s6 supervisor + Caddy routing), not three separate dev
# containers. The single image serves HTTP on 8080 internally (Caddy no-DOMAIN);
# this overlay publishes it on host 8091.
#
# It boots the single `flowfolio` service with:
#   - APP_PASSWORD=test-password-e2e                 (pre-seed → setup_complete
#                                                    effectively true → the /setup
#                                                    wizard is skipped, so global-setup
#                                                    login is unchanged)
#   - APP_ENV=development                            (NOT production, avoids the
#                                                    startup-guard refusal that trips on
#                                                    FLOWFOLIO_FIXED_NOW under production)
#   - FLOWFOLIO_FIXED_NOW=2026-04-30T12:00:00Z      (clock pin)
#   - FLOWFOLIO_SCHEDULER_ENABLED=false             (gates start_scheduler so no cron
#                                                    fires mid-suite; the
#                                                    supervisor still boots uvicorn,
#                                                    the scheduler just never starts)
#   - FLOWFOLIO_NETWORK_HERMETIC=true               (httpx outbound blocked)
#   - FLOWFOLIO_NULL_POOL=true                      (NullPool — fresh SQLite connection
#                                                    per request; eliminates the stale-inode
#                                                    race after test_db_reset.sh mv)
#   - db_data_test (separate named volume — the prod db_data is untouched)
#   - the read-only golden.sqlite bind-mount that test_db_reset.sh resets into /data
#   - env_file: !reset null                          (CLAUDE.md compose-overlay gotcha:
#                                                    clears the inherited `env_file: ./.env`
#                                                    from compose.yml so prod secrets cannot
#                                                    leak via env_file inheritance)
#
# WARNING: This overlay is for hermetic snapshot tests ONLY. The
# APP_PASSWORD=test-password-e2e hardcoded below MUST NEVER be copied into
# compose.yml or a production .env. The startup guard in backend/app/main.py
# refuses to boot if APP_ENV=production AND FLOWFOLIO_FIXED_NOW is set, that
# guard is the only thing standing between this overlay and a frozen
# production clock. Do not loosen the guard.

services:
  flowfolio:
    # Inherit the single image built by compose.yml (no bind-mount — deterministic
    # behaviour for snapshot tests). Override the volumes list so we get
    # db_data_test instead of db_data, AND add the read-only golden.sqlite mount,
    # AND drop the inherited prod `backups:/backups` volume (test stack never backs up).
    # `!override` replaces the inherited (production) volumes list with this entire
    # two-line list; dropping either line corrupts the test stack.
    volumes: !override
      - db_data_test:/data
      - ./tests/fixtures/golden.sqlite:/golden/golden.sqlite:ro
    # CLAUDE.md compose-overlay gotcha: `env_file: !reset null` is required to
    # CLEAR the inherited `env_file: ./.env` from compose.yml. Without this,
    # compose UNIONs the inherited env_file with our inline `environment:` block —
    # prod secrets would leak into the test stack at runtime.
    env_file: !reset null
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/flowfolio.db
      - SECRET_KEY=test-secret-not-for-production
      - APP_PASSWORD=test-password-e2e
      - APP_ENV=development
      - FLOWFOLIO_FIXED_NOW=2026-04-30T12:00:00Z
      - FLOWFOLIO_SCHEDULER_ENABLED=false
      - FLOWFOLIO_NETWORK_HERMETIC=true
      # NullPool: open a fresh DB connection per request so test_db_reset.sh
      # file replacements are visible immediately (no stale pool fd issues).
      # NEVER set this in production — NullPool has no connection reuse.
      - FLOWFOLIO_NULL_POOL=true
      - TZ=UTC
      - LOG_LEVEL=WARNING
      # Pricing/GitHub keys are DB-only now; there is no env path to a key,
      # so the test stack relies on the http_guard (FLOWFOLIO_NETWORK_HERMETIC)
      # plus an empty key store — clients raise "not configured" rather than fetch.
    # The single image serves HTTP on 8080 with no DOMAIN (vs the old caddy :80).
    # Publish it on host 8091; the dev stack on 8083 stays untouched.
    ports: !override
      - "8091:8080"

volumes:
  db_data_test:
