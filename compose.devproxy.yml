# Opt-in local dev-proxy overlay for the multi-container dev stack.
# Usage:
#   docker compose -f compose.multi.yml -f compose.dev.yml -f compose.devproxy.yml up

services:
  api:
    environment:
      APP_ENV: production

  caddy:
    ports: !override
      - "127.0.0.1:8083:80"
      - "127.0.0.1:8443:443"
    volumes: !override
      - ./Caddyfile.devproxy:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      default: {}
      devproxy:
        aliases:
          - flowfolio-edge

networks:
  devproxy:
    external: true
